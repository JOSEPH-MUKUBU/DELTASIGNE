<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DELTASIGNE — Application de traduction de langue des signes en temps réel. Par Joseph Mukubu Kapoya.">
  <meta name="keywords" content="langue des signes, traduction, MediaPipe, Flutter, accessibilité">
  <meta name="author" content="Joseph Mukubu Kapoya">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:title" content="DELTASIGNE — Sign Language Translator">
  <meta property="og:description" content="Traduisez la langue des signes en temps réel grâce à l'IA.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DELTASIGNE">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DELTASIGNE — Sign Language Translator</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-storage-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0E1A;
      font-family: 'Outfit', sans-serif;
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #0A0E1A 0%, #111827 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-container {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.5);
      margin-bottom: 24px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(108,99,255,0.5); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(108,99,255,0.8); }
    }

    .app-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .app-subtitle {
      color: #9CA3AF;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1F2937;
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 40px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .author {
      color: #6B7280;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Custom loading screen -->
  <div id="loading-screen">
    <div class="logo-container">🤟</div>
    <div class="app-name">DELTASIGNE</div>
    <div class="app-subtitle">La langue des signes pour tous</div>
    <div class="spinner"></div>
    <div class="author">Joseph Mukubu Kapoya</div>
  </div>

  <script>
    // Hide loading when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      screen.classList.add('hidden');
      setTimeout(() => screen.remove(), 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
