name: deltasigne
description: DELTASIGNE - SignLanguage Translator | Joseph Mukubu Kapoya
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Local Storage
  shared_preferences: ^2.3.2

  # HTTP / Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Camera
  camera: ^0.11.0+2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/gestures/
